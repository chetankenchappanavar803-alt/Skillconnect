<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Search Friends | Skill Connect</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
        <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#00d2ff",
                        "surface": "#0a0a0a",
                        "on-surface": "#ffffff",
                        "primary-container": "#02313a",
                        "on-primary-container": "#ffffff",
                        "surface-container": "#111111",
                        "surface-container-high": "#1a1a1a",
                        "surface-container-lowest": "#000000",
                        "surface-container-low": "#0d0d0d",
                        "on-surface-variant": "#a3a3a3",
                        "on-primary": "#000000"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface">
    <!-- Sidebar Navigation -->
    <aside class="fixed left-0 top-0 h-full w-72 bg-[#0a0a0a]/85 backdrop-blur-xl border-r border-white/10 flex flex-col py-12 px-6 z-50">
        <div class="mb-12">
            <h1 class="text-2xl font-bold tracking-tighter text-primary">SkillConnect</h1>
            <p class="text-on-surface-variant text-sm opacity-70">Scholarly Broadset</p>
        </div>
        <nav class="flex flex-col space-y-6">
            <a class="text-on-surface-variant pl-5 flex items-center gap-3 hover:translate-x-1 transition-transform" href="hackathons.html">
                <span class="material-symbols-outlined">event_available</span>
                Hackathons
            </a>
            <a class="text-primary font-semibold border-l-4 border-primary pl-4 flex items-center gap-3 transition-transform" href="search.html">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">search</span>
                Search
            </a>
            <a class="text-on-surface-variant pl-5 flex items-center gap-3 hover:translate-x-1 transition-transform" href="chat.html">
                <span class="material-symbols-outlined">chat_bubble</span>
                Chat
            </a>
            <a class="text-on-surface-variant pl-5 flex items-center gap-3 hover:translate-x-1 transition-transform" href="profile.html">
                <span class="material-symbols-outlined">person_outline</span>
                Profile
            </a>
        </nav>
    </aside>

    <!-- Top Nav -->
    <header class="sticky top-0 w-full z-40 bg-[#0a0a0a]/80 h-20 flex justify-between items-center px-12 border-b border-surface-variant/20 ml-72">
        <div class="flex items-center gap-8">
            <h2 id="search-title" class="text-xl font-bold text-primary">Discover People</h2>
            <div class="flex bg-surface-container-low p-1 rounded-xl">
                <button id="toggle-people" class="px-6 py-1.5 rounded-lg text-xs font-bold uppercase tracking-widest transition-all bg-surface-container shadow-sm text-primary">People</button>
                <button id="toggle-hackathons" class="px-6 py-1.5 rounded-lg text-xs font-bold uppercase tracking-widest transition-all text-on-surface-variant hover:text-primary">Hackathons</button>
            </div>
        </div>
        <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-xl">search</span>
            <input id="main-search-input" type="text" placeholder="Search by skills or name..." class="pl-12 pr-6 py-2.5 bg-surface-container-low border-0 border-b-2 border-primary/10 focus:border-primary focus:ring-0 rounded-xl font-medium text-sm w-80 transition-all focus:w-96">
        </div>
    </header>

    <!-- Main Content -->
    <main class="ml-72 p-12 min-h-screen">
        <div class="max-w-[1400px] mx-auto">
            <section class="mb-16 text-center lg:text-left">
                <h2 class="text-6xl font-extrabold tracking-tighter text-on-surface mb-4">Find your<br/>Partner.</h2>
                <p class="text-lg text-on-surface-variant max-w-xl leading-relaxed opacity-80">
                    Connect with other developers and creators. Filter by expertise or search for specific skills.
                </p>
            </section>

            <div class="grid grid-cols-12 gap-12">
                <!-- Filters -->
                <div class="col-span-3 space-y-12">
                    <div>
                        <h4 class="text-xs font-bold uppercase tracking-widest text-primary mb-6">Expertise Domains</h4>
                        <div class="space-y-4">
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20"/>
                                <span class="text-sm font-medium">Frontend Development</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20"/>
                                <span class="text-sm font-medium">Backend Systems</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20"/>
                                <span class="text-sm font-medium">AI & Machine Learning</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Results -->
                <div class="col-span-9">
                    <div id="results-count" class="text-sm font-bold uppercase tracking-widest text-on-surface-variant mb-8">Showing results</div>
                    <div id="results-grid" class="grid grid-cols-2 gap-8">
                        <!-- User cards will be injected here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script>
        const grid = document.getElementById('results-grid');
        const searchInput = document.getElementById('main-search-input');
        const togglePeople = document.getElementById('toggle-people');
        const toggleHackathons = document.getElementById('toggle-hackathons');
        const searchTitle = document.getElementById('search-title');

        let currentMode = 'people';

        async function performSearch(query = '') {
            grid.innerHTML = '<div class="col-span-full py-20 text-center"><span class="material-symbols-outlined animate-spin text-4xl text-primary/20">refresh</span></div>';

            if (currentMode === 'people') {
                let dbQuery = supabaseClient.from('profiles').select('*');
                if (query) {
                    dbQuery = dbQuery.or(`full_name.ilike.%${query}%,skills.cs.{${query}}`);
                }
                const { data } = await dbQuery;
                renderResults(data || []);
            } else {
                let dbQuery = supabaseClient.from('hackathons').select('*');
                if (query) {
                    dbQuery = dbQuery.or(`title.ilike.%${query}%,description.ilike.%${query}%`);
                }
                const { data } = await dbQuery;
                renderHackathons(data || []);
            }
        }

        function renderResults(people) {
            if (people.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-20 text-center text-on-surface-variant font-medium">No one found with those skills. Try another search.</div>';
                return;
            }
            grid.innerHTML = people.map(person => `
                <article class="bg-surface-container-lowest rounded-3xl p-8 border border-primary/5 hover:shadow-2xl hover:-translate-y-1 transition-all duration-500 cursor-pointer" onclick="window.location.href='profile.html?id=${person.id}'">
                    <div class="flex items-start justify-between mb-6">
                        <div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center">
                            <span class="material-symbols-outlined text-primary text-3xl">person</span>
                        </div>
                        <button class="w-10 h-10 border border-primary/10 rounded-full flex items-center justify-center text-primary/40 hover:text-primary transition-colors">
                            <span class="material-symbols-outlined">more_vert</span>
                        </button>
                    </div>
                    <h3 class="text-2xl font-black tracking-tighter mb-2 text-on-surface">${person.full_name || 'Anonymous'}</h3>
                    <p class="text-on-surface-variant text-sm font-medium mb-6 line-clamp-2">${person.bio || 'Active collaborator in the community.'}</p>
                    <div class="flex flex-wrap gap-2">
                        ${(person.skills || []).slice(0, 3).map(skill => `<span class="px-3 py-1 bg-surface-container-low text-[10px] font-black uppercase tracking-widest text-primary/60 rounded-full border border-primary/5">${skill}</span>`).join('')}
                        ${(person.skills || []).length > 3 ? `<span class="px-3 py-1 bg-surface-container-low text-[10px] font-black uppercase tracking-widest text-primary/30 rounded-full">+${person.skills.length - 3}</span>` : ''}
                    </div>
                    <button onclick="event.stopPropagation(); startChat('${person.id}')" class="mt-6 w-full py-3 bg-primary-container text-white rounded font-bold text-xs uppercase tracking-widest hover:opacity-90">Message</button>
                </article>
            `).join('');
        }

        function renderHackathons(items) {
            if (items.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-20 text-center text-on-surface-variant font-medium">No hackathons found.</div>';
                return;
            }
            grid.innerHTML = items.map(h => `
                <article class="bg-surface-container-lowest rounded-3xl p-8 border border-primary/5 hover:shadow-2xl hover:-translate-y-1 transition-all duration-500 cursor-pointer" onclick="window.location.href='hackathons.html'">
                    <div class="flex items-start justify-between mb-6">
                        <div class="w-16 h-16 bg-primary/5 rounded-2xl flex items-center justify-center">
                            <span class="material-symbols-outlined text-primary text-3xl">rocket_launch</span>
                        </div>
                        <div class="px-3 py-1 bg-green-50 text-[10px] font-black uppercase tracking-widest text-green-600 rounded-full">${new Date(h.date).toLocaleDateString()}</div>
                    </div>
                    <h3 class="text-2xl font-black tracking-tighter mb-2 text-on-surface">${h.title}</h3>
                    <p class="text-on-surface-variant text-sm font-medium mb-6 line-clamp-2">${h.description}</p>
                    <div class="flex items-center gap-2 text-primary font-bold text-[10px] uppercase tracking-widest">
                        View Details <span class="material-symbols-outlined text-sm">arrow_forward</span>
                    </div>
                </article>
            `).join('');
        }

        togglePeople.addEventListener('click', () => {
            currentMode = 'people';
            searchTitle.textContent = 'Discover People';
            searchInput.placeholder = 'Search by skills or name...';
            togglePeople.className = 'px-6 py-1.5 rounded-lg text-xs font-bold uppercase tracking-widest transition-all bg-surface-container shadow-sm text-primary';
            toggleHackathons.className = 'px-6 py-1.5 rounded-lg text-xs font-bold uppercase tracking-widest transition-all text-on-surface-variant hover:text-primary';
            performSearch(searchInput.value);
        });

        toggleHackathons.addEventListener('click', () => {
            currentMode = 'hackathon';
            searchTitle.textContent = 'Discover Events';
            searchInput.placeholder = 'Search by title or description...';
            toggleHackathons.className = 'px-6 py-1.5 rounded-lg text-xs font-bold uppercase tracking-widest transition-all bg-surface-container shadow-sm text-primary';
            togglePeople.className = 'px-6 py-1.5 rounded-lg text-xs font-bold uppercase tracking-widest transition-all text-on-surface-variant hover:text-primary';
            performSearch(searchInput.value);
        });

        searchInput.addEventListener('input', (e) => {
            performSearch(e.target.value);
        });

        async function startChat(userId) {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return;

            // Check if chat exists or create new one
            // This is a simplified logic
            window.location.href = `chat.html?peer=${userId}`;
        }

        searchInput.addEventListener('input', (e) => searchUsers(e.target.value));
        searchUsers();
    </script>
</body>
</html>
