<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Chat | Skill Connect</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #e0e3e5; border-radius: 10px; }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#2a14b4",
                        "primary-container": "#4338ca",
                        "surface": "#f7f9fb",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#464554",
                        "surface-container-low": "#f2f4f6",
                        "surface-container-lowest": "#ffffff",
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface overflow-hidden h-screen flex">
    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 h-full w-72 bg-slate-50/85 backdrop-blur-xl border-r border-slate-200/10 flex flex-col py-12 px-6 z-50">
        <div class="mb-12">
            <h1 class="text-2xl font-bold tracking-tighter text-indigo-800">SkillConnect</h1>
        </div>
        <nav class="flex flex-col gap-y-2">
            <a class="flex items-center gap-4 py-3 text-slate-500 pl-5 hover:translate-x-1 transition-transform" href="hackathons.html">
                <span class="material-symbols-outlined">event_available</span>
                <span>Hackathons</span>
            </a>
            <a class="flex items-center gap-4 py-3 text-slate-500 pl-5 hover:translate-x-1 transition-transform" href="search.html">
                <span class="material-symbols-outlined">search</span>
                <span>Search</span>
            </a>
            <a class="flex items-center gap-4 py-3 text-indigo-700 font-semibold border-l-4 border-indigo-700 pl-4" href="chat.html">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
                <span>Chat</span>
            </a>
            <a class="flex items-center gap-4 py-3 text-slate-500 pl-5 hover:translate-x-1 transition-transform" href="profile.html">
                <span class="material-symbols-outlined">person_outline</span>
                <span>Profile</span>
            </a>
        </nav>
    </aside>

    <!-- Main Chat Area -->
    <main class="ml-72 flex-1 flex flex-col h-full bg-white relative">
        <header class="sticky top-0 w-full z-40 bg-white/80 backdrop-blur-md h-20 flex justify-between items-center px-12 border-b border-surface-variant/20">
            <div class="flex flex-col">
                <h2 id="chat-title" class="text-xl font-bold tracking-tight text-primary">Messages</h2>
                <p id="chat-status" class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Select a conversation</p>
            </div>
            <button id="create-group-btn" class="flex items-center gap-2 text-primary font-bold text-sm tracking-wide uppercase">
                <span class="material-symbols-outlined">group_add</span>
                <span>New Group</span>
            </button>
        </header>

        <!-- Messages List (Left Sub-pane) -->
        <div class="flex flex-1 overflow-hidden">
            <div class="w-96 bg-surface-container-low border-r border-surface-variant/10 flex flex-col h-full">
                <div id="chats-list" class="flex-1 overflow-y-auto p-4 space-y-2 chat-scroll">
                    <!-- Conversations injected here -->
                </div>
            </div>

            <!-- Chat History (Right Sub-pane) -->
            <div class="flex-1 flex flex-col h-full bg-white">
                <div id="messages-container" class="flex-1 overflow-y-auto p-12 space-y-8 chat-scroll">
                    <!-- Messages injected here -->
                    <div class="flex flex-col items-center justify-center h-full text-slate-400">
                        <span class="material-symbols-outlined text-6xl mb-4">forum</span>
                        <p>No conversation selected.</p>
                    </div>
                </div>

                <!-- Input -->
                <footer class="p-8 bg-white border-t border-surface-variant/10">
                    <div class="max-w-4xl mx-auto">
                        <form id="message-form" class="relative flex items-center group">
                            <input id="message-input" class="w-full bg-surface-container-low border-none rounded-full py-5 pl-12 pr-20 focus:ring-2 focus:ring-primary/20" placeholder="Type a message..."/>
                            <button type="submit" class="absolute right-3 w-12 h-12 bg-primary text-white rounded-full flex items-center justify-center shadow-lg transform hover:scale-105 active:scale-95 transition-transform">
                                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
                            </button>
                        </form>
                    </div>
                </footer>
            </div>
        </div>
    </main>

    <!-- Group Modal -->
    <div id="group-modal" class="hidden fixed inset-0 bg-black/50 z-[100] flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl w-96">
            <h3 class="text-lg font-bold mb-4">Create New Group</h3>
            <input id="group-name-input" class="w-full mb-4 p-3 border rounded-lg" placeholder="Group Name"/>
            <div class="flex justify-end gap-2">
                <button id="cancel-group" class="px-4 py-2 text-slate-500">Cancel</button>
                <button id="create-group-btn" class="px-4 py-2 bg-primary text-white rounded-lg">Create</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const chatsList = document.getElementById('chats-list');
        const messagesContainer = document.getElementById('messages-container');
        const messageForm = document.getElementById('message-form');
        const msgInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const newGroupBtn = document.getElementById('new-group-btn');
        const groupModal = document.getElementById('group-modal');
        const cancelGroup = document.getElementById('cancel-group');
        const createGroupBtn = document.getElementById('create-group-btn');
        const groupNameInput = document.getElementById('group-name-input');
        const chatTitle = document.getElementById('chat-title');
        const chatStatus = document.getElementById('chat-status');

        let currentUser = null;
        let currentChatId = null;

        async function initChat() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            currentUser = session?.user;
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }

            // Handle peer from URL
            const urlParams = new URLSearchParams(window.location.search);
            const peerId = urlParams.get('peer');
            if (peerId) {
                await startSpecificChat(peerId);
            }

            // Load conversations
            loadChats();

            // Realtime subscription
            supabaseClient
                .channel('public:messages')
                .on('postgres_changes', { event: 'INSERT', table: 'messages' }, payload => {
                    if (payload.new.chat_id === currentChatId) {
                        appendMessage(payload.new);
                    }
                    loadChats(); // Refresh list to show latest message/new chats
                })
                .subscribe();
        }

        newGroupBtn.addEventListener('click', () => groupModal.classList.remove('hidden'));
        cancelGroup.addEventListener('click', () => groupModal.classList.add('hidden'));

        createGroupBtn.addEventListener('click', async () => {
            const name = groupNameInput.value.trim();
            if (!name) return;

            const { data: chat, error } = await supabaseClient
                .from('chats')
                .insert([{ name: name, is_group: true }])
                .select()
                .single();

            if (chat) {
                await supabaseClient.from('chat_participants').insert([
                    { chat_id: chat.id, profile_id: currentUser.id }
                ]);
                groupModal.classList.add('hidden');
                loadChats();
                selectChat(chat.id, name);
            } else {
                alert(error.message);
            }
        });

        async function startSpecificChat(peerId) {
            // Check if a direct chat already exists with this person
            // For simplicity, we create a new chat and participants
            // A more robust implementation would check for existing pairings
            const { data: chat, error: chatError } = await supabaseClient
                .from('chats')
                .insert([{ is_group: false }])
                .select()
                .single();
            
            if (chat) {
                await supabaseClient.from('chat_participants').insert([
                    { chat_id: chat.id, profile_id: currentUser.id },
                    { chat_id: chat.id, profile_id: peerId }
                ]);
                selectChat(chat.id, 'New Conversation');
            }
        }

        async function loadChats() {
            // Complex join needed, for simplicity fetching all chats the user is in
            const { data: participations } = await supabaseClient
                .from('chat_participants')
                .select('chat_id, chats(id, name, is_group)')
                .eq('profile_id', currentUser.id);

            if (participations) {
                chatsList.innerHTML = participations.map(p => `
                    <div onclick="selectChat('${p.chats.id}', '${p.chats.name || 'Private Chat'}')" class="p-4 bg-white rounded-xl shadow-sm cursor-pointer border-l-4 border-transparent hover:border-primary transition-all">
                        <h3 class="font-bold truncate">${p.chats.name || 'Private Chat'}</h3>
                        <p class="text-xs text-slate-400">Click to open</p>
                    </div>
                `).join('');
            }
        }

        async function selectChat(id, name) {
            currentChatId = id;
            chatTitle.textContent = name;
            chatStatus.textContent = 'Active now';
            
            // Load messages
            const { data: messages } = await supabaseClient
                .from('messages')
                .select('*')
                .eq('chat_id', id)
                .order('created_at', { ascending: true });

            messagesContainer.innerHTML = messages.map(msg => renderMessage(msg)).join('');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function renderMessage(msg) {
            const isSelf = msg.sender_id === currentUser.id;
            return `
                <div class="flex gap-4 ${isSelf ? 'flex-row-reverse self-end' : ''}">
                    <div class="flex flex-col ${isSelf ? 'items-end' : ''}">
                        <div class="${isSelf ? 'bg-primary-container text-white' : 'bg-surface-container-low text-on-surface'} p-5 rounded-3xl max-w-sm">
                            ${msg.content}
                        </div>
                        <span class="text-[10px] text-slate-400 mt-1">${new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>
                </div>
            `;
        }

        function appendMessage(msg) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = renderMessage(msg);
            messagesContainer.appendChild(tempDiv.firstElementChild);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentChatId || !messageInput.value) return;

            const content = messageInput.value;
            messageInput.value = '';

            const { error } = await supabaseClient
                .from('messages')
                .insert([{ chat_id: currentChatId, sender_id: currentUser.id, content }]);
            
            if (error) console.error(error);
        });

        initChat();
    </script>
</body>
</html>
